name: Windows Portable Bundle

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-bundle:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $value = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $value = "preview.${{ github.run_number }}"
          }
          "value=$value" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build portable bundle
        shell: pwsh
        run: ./scripts/package_windows.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkLink-windows-${{ steps.version.outputs.value }}
          path: dist/windows/WorkLink-windows-${{ steps.version.outputs.value }}.zip
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windows/WorkLink-windows-${{ steps.version.outputs.value }}.zip
          generate_release_notes: true
