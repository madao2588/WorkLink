version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: worklink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: worklink
      POSTGRES_USER: worklink
      POSTGRES_PASSWORD: worklink123
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worklink -d worklink"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
